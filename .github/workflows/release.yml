name: Release

on:
  workflow_dispatch:
    inputs:
      first_release:
        description: Use Nx first-release mode for the initial publish.
        required: true
        default: false
        type: boolean
      dry_run:
        description: Preview the release without publishing or pushing tags.
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Require main
        if: ${{ github.ref_name != 'main' }}
        run: |
          echo "Release workflow must be run from main." >&2
          exit 1
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec nx run-many -t lint test typecheck build --projects=foundry-ai --outputStyle=static
      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Create release commit and tag
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          FIRST_RELEASE: ${{ inputs.first_release }}
        run: |
          set -euo pipefail
          args=(release --group npm-packages --skip-publish)
          if [ "$FIRST_RELEASE" = "true" ]; then
            args+=(--first-release)
          fi
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          pnpm exec nx "${args[@]}"
      - name: Verify npm auth
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami
      - name: Publish package
        if: ${{ !inputs.dry_run }}
        env:
          FIRST_RELEASE: ${{ inputs.first_release }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          args=(release publish --group npm-packages)
          if [ "$FIRST_RELEASE" = "true" ]; then
            args+=(--first-release)
          fi
          pnpm exec nx "${args[@]}"
      - name: Push release commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin --tags
