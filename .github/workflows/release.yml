name: Publish Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - 'nx.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'packages/foundry-ai/**'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  publish-prerelease:
    if: >-
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Prepare prerelease version
        id: meta
        run: |
          set -euo pipefail
          package_root="packages/foundry-ai"
          name=$(node -p "require('./${package_root}/package.json').name")
          version=$(node scripts/resolve-next-prerelease-version.mjs rc)

          node scripts/set-package-version.mjs "${package_root}/package.json" "${version}"

          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - run: pnpm exec nx run-many -t build package-audit --projects=foundry-ai --outputStyle=static

      - name: Check if already published
        id: check
        env:
          PKG_NAME: ${{ steps.meta.outputs.name }}
          PKG_VERSION: ${{ steps.meta.outputs.version }}
          DIST_TAG: next
        run: |
          set -euo pipefail

          if npm view "${PKG_NAME}@${PKG_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            current_tag_version=$(npm view "${PKG_NAME}" "dist-tags.${DIST_TAG}" --json --registry=https://registry.npmjs.org 2>/dev/null | tr -d '"')

            if [ "${current_tag_version}" = "${PKG_VERSION}" ]; then
              echo "already_published=true" >> "$GITHUB_OUTPUT"
              echo "${PKG_NAME}@${PKG_VERSION} is already published with dist-tag ${DIST_TAG}; skipping publish."
              exit 0
            fi

            echo "::error::${PKG_NAME}@${PKG_VERSION} already exists, but dist-tag ${DIST_TAG} points to ${current_tag_version:-<unset>}. Retagging is intentionally not handled by this workflow."
            exit 1
          fi

          echo "already_published=false" >> "$GITHUB_OUTPUT"

      - name: Publish prerelease to npm
        if: steps.check.outputs.already_published != 'true'
        run: |
          cd packages/foundry-ai
          # Clear ambient token so npm falls through to GitHub OIDC trusted publishing.
          NODE_AUTH_TOKEN="" npm publish --access public --tag next --provenance

  publish-stable:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec nx run-many -t build package-audit --projects=foundry-ai --outputStyle=static

      - name: Resolve package metadata
        id: meta
        run: |
          set -euo pipefail
          package_root="packages/foundry-ai"
          name=$(node -p "require('./${package_root}/package.json').name")
          version=$(node -p "require('./${package_root}/package.json').version")

          if echo "${version}" | grep -qE '\-'; then
            echo "::error::Expected a stable version on main after merging a release PR, but found ${version}."
            exit 1
          fi

          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Check if already published
        id: check
        env:
          PKG_NAME: ${{ steps.meta.outputs.name }}
          PKG_VERSION: ${{ steps.meta.outputs.version }}
          DIST_TAG: latest
        run: |
          set -euo pipefail

          if npm view "${PKG_NAME}@${PKG_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            current_tag_version=$(npm view "${PKG_NAME}" "dist-tags.${DIST_TAG}" --json --registry=https://registry.npmjs.org 2>/dev/null | tr -d '"')

            if [ "${current_tag_version}" = "${PKG_VERSION}" ]; then
              echo "already_published=true" >> "$GITHUB_OUTPUT"
              echo "${PKG_NAME}@${PKG_VERSION} is already published with dist-tag ${DIST_TAG}; skipping publish."
              exit 0
            fi

            echo "::error::${PKG_NAME}@${PKG_VERSION} already exists, but dist-tag ${DIST_TAG} points to ${current_tag_version:-<unset>}. Retagging is intentionally not handled by this workflow."
            exit 1
          fi

          echo "already_published=false" >> "$GITHUB_OUTPUT"

      - name: Publish stable to npm
        if: steps.check.outputs.already_published != 'true'
        run: |
          cd packages/foundry-ai
          # Clear ambient token so npm falls through to GitHub OIDC trusted publishing.
          NODE_AUTH_TOKEN="" npm publish --access public --tag latest --provenance

      - name: Tag stable release
        env:
          PKG_NAME: ${{ steps.meta.outputs.name }}
          PKG_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tag="${PKG_NAME}@${PKG_VERSION}"
          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then
            echo "${tag} already exists on origin — skipping tag push."
            exit 0
          fi

          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"
