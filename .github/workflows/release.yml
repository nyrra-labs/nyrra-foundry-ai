name: Release

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release.yml"
      - "nx.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "packages/foundry-ai/package.json"
      - "packages/foundry-ai/README.md"
      - "packages/foundry-ai/src/**"
      - "packages/foundry-ai/tsconfig*.json"
      - "packages/foundry-ai/tsup.config.ts"
      - "packages/foundry-ai/vitest*.ts"
  workflow_dispatch:
    inputs:
      release_type:
        description: Publish a stable release or prerelease.
        required: true
        default: stable
        type: choice
        options:
          - stable
          - prerelease
      preid:
        description: Prerelease identifier when release_type=prerelease.
        required: true
        default: rc
        type: string
      first_release:
        description: Use Nx first-release mode for the initial publish.
        required: true
        default: false
        type: boolean
      dry_run:
        description: Preview the release without publishing or pushing tags.
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main' && (github.event_name != 'push' || github.actor != 'github-actions[bot]')
    runs-on: ubuntu-latest
    steps:
      - name: Require main
        if: ${{ github.ref_name != 'main' }}
        run: |
          echo "Release workflow must be run from main." >&2
          exit 1
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Show Node and npm versions
        run: |
          node --version
          npm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec nx run-many -t lint test typecheck build --projects=foundry-ai --outputStyle=static
      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Create release commit and tag
        env:
          DRY_RUN_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          FIRST_RELEASE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.first_release || 'false' }}
          PREID_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.preid || 'rc' }}
          RELEASE_TYPE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.release_type || 'prerelease' }}
        run: |
          set -euo pipefail
          release_type="${RELEASE_TYPE_INPUT}"
          preid="${PREID_INPUT}"
          dry_run="${DRY_RUN_INPUT}"
          first_release="false"

          if ! git tag --list '@nyrra/foundry-ai@*' | grep -q .; then
            first_release="true"
          fi

          if [ "${FIRST_RELEASE_INPUT}" = "true" ]; then
            first_release="true"
          fi

          args=(release --group npm-packages --skip-publish)
          if [ "$release_type" = "prerelease" ]; then
            args+=(--preid "$preid")
          fi
          if [ "$first_release" = "true" ]; then
            args+=(--first-release)
          fi
          if [ "$dry_run" = "true" ]; then
            args+=(--dry-run)
          fi
          pnpm exec nx "${args[@]}"
      - name: Publish package
        env:
          DRY_RUN_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          RELEASE_TYPE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.release_type || 'prerelease' }}
        run: |
          set -euo pipefail
          if [ "${DRY_RUN_INPUT}" = "true" ]; then
            echo "Skipping publish because dry_run=true."
            exit 0
          fi

          package_root="packages/foundry-ai"
          package_name=$(node -p "require('./${package_root}/package.json').name")
          package_version=$(node -p "require('./${package_root}/package.json').version")
          dist_tag="latest"

          if [ "$RELEASE_TYPE_INPUT" = "prerelease" ]; then
            dist_tag="next"
          fi

          if npm view "${package_name}@${package_version}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            current_tag_version=$(npm view "${package_name}" "dist-tags.${dist_tag}" --json --registry=https://registry.npmjs.org 2>/dev/null | tr -d '"')

            if [ "${current_tag_version}" = "${package_version}" ]; then
              echo "${package_name}@${package_version} is already published with dist-tag ${dist_tag}; skipping publish."
              exit 0
            fi

            echo "::error::${package_name}@${package_version} already exists, but dist-tag ${dist_tag} points to ${current_tag_version:-<unset>}. Retagging is intentionally not handled by this trusted-publishing workflow."
            exit 1
          fi

          (
            cd "${package_root}"
            NODE_AUTH_TOKEN="" npm publish --access public --tag "${dist_tag}"
          )
      - name: Push release commit and tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}" = "true" ]; then
            echo "Skipping git push because dry_run=true."
            exit 0
          fi
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin --tags
