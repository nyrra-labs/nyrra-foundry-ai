name: Release PR

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Publish a stable release or prerelease.
        required: true
        default: stable
        type: choice
        options:
          - stable
          - prerelease
      preid:
        description: Prerelease identifier when release_type=prerelease.
        required: true
        default: rc
        type: string
      first_release:
        description: Use Nx first-release mode for the initial publish.
        required: true
        default: false
        type: boolean
      dry_run:
        description: Preview the release without creating a PR.
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-pr
  cancel-in-progress: false

jobs:
  prepare:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Require main
        if: ${{ github.ref_name != 'main' }}
        run: |
          echo "Release workflow must be run from main." >&2
          exit 1

      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec nx run-many -t lint test typecheck build skills-validate package-audit --projects=foundry-ai --outputStyle=static

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare release
        id: version
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          PREID: ${{ inputs.preid }}
          FIRST_RELEASE: ${{ inputs.first_release }}
        run: |
          set -euo pipefail

          if [ "${RELEASE_TYPE}" = "prerelease" ]; then
            next_version=$(node scripts/resolve-next-prerelease-version.mjs "${PREID}")
            node scripts/set-package-version.mjs packages/foundry-ai/package.json "${next_version}"
            echo "version=${next_version}" >> "$GITHUB_OUTPUT"
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
            echo "Prepared prerelease version ${next_version}."
          else
            # Stable release: let Nx write files, but keep git commit/tag/push
            # in this workflow so the release branch is the only place those
            # side effects happen.
            first_release="false"
            if ! git tag --list '@nyrra/foundry-ai@*' | grep -q .; then
              first_release="true"
            fi
            if [ "${FIRST_RELEASE}" = "true" ]; then
              first_release="true"
            fi

            version_args=(
              release
              version
              --group
              npm-packages
              --git-commit=false
              --git-tag=false
              --git-push=false
              --stage-changes=false
            )
            changelog_args=(
              release
              changelog
              --group
              npm-packages
              --git-commit=false
              --git-tag=false
              --git-push=false
              --stage-changes=false
            )
            if [ "$first_release" = "true" ]; then
              version_args+=(--first-release)
              changelog_args+=(--first-release)
            fi

            pnpm exec nx "${version_args[@]}"
            next_version=$(node -p "require('./packages/foundry-ai/package.json').version")
            pnpm exec nx "${changelog_args[@]}" "${next_version}"

            echo "version=${next_version}" >> "$GITHUB_OUTPUT"
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "Prepared stable version ${next_version}."
          fi

          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No release changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release branch and PR
        if: inputs.dry_run != true && steps.version.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          DIST_TAG: ${{ steps.version.outputs.dist_tag }}
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          set -euo pipefail

          branch="release/v${VERSION}"
          git checkout -b "${branch}"
          git add -A
          git commit -m "chore(release): @nyrra/foundry-ai@${VERSION}"
          git push origin "${branch}"

          if [ "${RELEASE_TYPE}" = "stable" ]; then
            gh pr create \
              --title "chore(release): @nyrra/foundry-ai@${VERSION}" \
              --body "$(cat <<EOF
          ## Release \`@nyrra/foundry-ai@${VERSION}\`

          Merging this PR will trigger the publish workflow which will:
          - Publish to npm with \`dist-tag=${DIST_TAG}\`
          - Tag \`@nyrra/foundry-ai@${VERSION}\` on main

          ### Changelog
          See the CHANGELOG.md diff in this PR for the full list of changes.
          EOF
          )" \
              --base main \
              --head "${branch}"
          else
            gh pr create \
              --title "chore(release): @nyrra/foundry-ai@${VERSION}" \
              --body "$(cat <<EOF
          ## Prerelease \`@nyrra/foundry-ai@${VERSION}\`

          Merging this PR will trigger the publish workflow which will:
          - Publish to npm with \`dist-tag=${DIST_TAG}\`

          Prerelease versions do not create git tags.
          EOF
          )" \
              --base main \
              --head "${branch}"
          fi

      - name: No-op summary
        if: steps.version.outputs.has_changes != 'true'
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- No release changes were detected, so no PR was created." >> "$GITHUB_STEP_SUMMARY"

      - name: Dry run summary
        if: inputs.dry_run == true && steps.version.outputs.has_changes == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DIST_TAG: ${{ steps.version.outputs.dist_tag }}
        run: |
          echo "## Dry Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: ${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Dist tag**: ${DIST_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "- No PR was created." >> "$GITHUB_STEP_SUMMARY"
